name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-qt5-winextras
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-python3
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-zlib

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            ..

      - name: Build
        run: |
          cd build
          mingw32-make -j$(nproc)

      - name: Collect runtime dependencies
        run: |
          mkdir -p dist
          cp build.dir/PXView.exe dist/

          # Qt deploy
          windeployqt dist/PXView.exe --no-translations

          # Copy MinGW runtime DLLs
          MINGW_BIN=/mingw64/bin
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            cp "$MINGW_BIN/$dll" dist/
          done

          # Copy dependency DLLs
          ldd dist/PXView.exe | grep mingw64 | awk '{print $3}' | while read -r lib; do
            cp "$lib" dist/ 2>/dev/null || true
          done

          # Copy decoders and resources
          mkdir -p dist/share/PXView/libsigrokdecode
          cp -r libsigrokdecode/decoders dist/share/PXView/libsigrokdecode/
          cp -r PXView/res dist/share/PXView/
          cp -r PXView/demo dist/share/PXView/
          cp -r lang dist/share/PXView/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PXView-Windows-x64
          path: dist/
